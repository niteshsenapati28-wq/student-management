services:
  # The "kitchen" — PocketBase backend (database + auth + admin panel)
  - type: web
    name: stdmgt-backend
    runtime: docker
    dockerfilePath: ./apps/pocketbase/Dockerfile
    dockerContext: ./apps/pocketbase
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PB_SUPERUSER_EMAIL
        sync: false
      - key: PB_SUPERUSER_PASSWORD
        sync: false

  # The "dining room" — the React website itself
  - type: web
    runtime: static
    name: stdmgt-frontend
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: ./dist/apps/web
    envVars:
      - key: VITE_POCKETBASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
